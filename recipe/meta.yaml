{% set name = "pyignite" %}
{% set version = "0.6.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyignite-{{ version }}.zip
  sha256: e143d7a907e2662da11f63d2e9e34234dc722cd63c9aeb74486280e3aef3369d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - attrs >=20.3.0

test:
  imports:
    - pyignite
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/apache/ignite-python-thin-client
  summary: Apache Ignite binary client Python API
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE

extra:
  recipe-maintainers:
    - rxm7706
